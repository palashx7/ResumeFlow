services:
  # 1. The Unified Backend (API + Redis + Celery all running in one Free instance)
  - type: web
    name: resumeflow-backend-monolith
    env: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile.render
    plan: free # 100% Free Web Service
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: resumeflow-db
          property: connectionString
      - key: REDIS_URL
        value: redis://localhost:6379/0
      - key: SECRET_KEY
        generateValue: true

  # 2. Next.js Frontend (Static Site hosted for Free)
  - type: web
    name: resumeflow-frontend
    env: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    plan: free # Render allows you to switch this to a "Static Site" if you prefer Vercel, but we will try Web Service first.
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: resumeflow-backend-monolith
          envVarKey: RENDER_EXTERNAL_URL

databases:
  # 3. PostgreSQL Database (Free for 90 days)
  - name: resumeflow-db
    databaseName: resume_pipeline
    plan: free
