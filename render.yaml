services:
  # 5. Redis Queue
  - type: redis
    name: resumeflow-redis
    plan: starter # Managed Redis is $3/mo on Render

  # 1. FastAPI Backend (Web Service)
  - type: web
    name: resumeflow-api
    env: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: resumeflow-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: resumeflow-redis
          envVarKey: REDIS_URL
      - key: SECRET_KEY
        generateValue: true

  # 2. Celery Background Worker
  - type: worker
    name: resumeflow-worker
    env: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    dockerCommand: celery -A celery_worker worker --loglevel=info --concurrency=2
    plan: starter # Render requires Paid tier ($7/mo) for Background Workers
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: resumeflow-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: resumeflow-redis
          envVarKey: REDIS_URL
      - key: SECRET_KEY
        fromService:
          type: web
          name: resumeflow-api
          envVarKey: SECRET_KEY

  # 3. Next.js Frontend (Web Service) 
  - type: web
    name: resumeflow-frontend
    env: docker
    rootDir: frontend
    dockerfilePath: ./Dockerfile
    plan: free # Note: Render only allows 1 free web service per account. You may need 'starter' ($7/mo)
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: resumeflow-api
          envVarKey: RENDER_EXTERNAL_URL

databases:
  # 4. PostgreSQL Database
  - name: resumeflow-db
    databaseName: resume_pipeline
    user: postgres
    plan: free
